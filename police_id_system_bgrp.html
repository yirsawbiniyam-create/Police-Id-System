<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGRP Police ID System</title>

<style>
body { font-family: Arial; background:#eef2f7; }
.container { max-width:1000px; margin:auto; background:#fff; padding:20px; border-radius:12px; }
h2 { text-align:center; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
input { width:100%; padding:8px; border-radius:6px; border:1px solid #ccc; }
label { font-weight:bold; }
button { padding:10px; background:#0b5ed7; color:white; border:none; border-radius:6px; cursor:pointer; margin-right:10px; }

.print-area { display:flex; gap:20px; flex-wrap:wrap; }

.card { width:350px; height:220px; border-radius:12px; padding:10px; position:relative; box-shadow:0 0 10px rgba(0,0,0,0.2); overflow:hidden; }
.front { background: linear-gradient(gold, skyblue); }
.back { background:#fff; }

.emblem { position:absolute; top:5px; height:45px; }
.left { left:5px; }
.center { left:50%; transform:translateX(-50%); }
.right { right:5px; }

.photo { position:absolute; right:10px; top:70px; width:80px; height:90px; object-fit:cover; border-radius:6px; }
.text { font-size:12px; font-weight:bold; color:black; }

.watermark { position:absolute; opacity:0.1; width:150px; top:40px; left:100px; }

.qr-big { position:absolute; bottom:10px; left:10px; }

@media print {
  body * { visibility:hidden; }
  #printSection, #printSection * { visibility:visible; }
  #printSection { position:absolute; top:0; left:0; }
}
</style>
</head>
<body>

<div class="container">
<h2>BGRP Police ID System</h2>

<div class="form-grid">
<input id="nameAmh" placeholder="ሙሉ ስም">
<input id="nameEng" placeholder="Full Name">
<input id="rank" placeholder="Rank">
<input id="role" placeholder="Responsibility">
<input id="phone" placeholder="Phone">
<input id="blood" placeholder="Blood Type">
<input id="age" placeholder="Age">
<input id="sex" placeholder="Sex">
<input id="height" placeholder="Height">
<input id="emergencyName" placeholder="Emergency Name">
<input id="emergencyPhone" placeholder="Emergency Phone">

<input type="file" id="photo">
<input type="file" id="flagLeft">
<input type="file" id="flagRight">
<input type="file" id="logo">
<input type="file" id="signature">
</div>

<br>
<button onclick="generateID()">Generate ID</button>
<button onclick="printID()">Print ID</button>

<div id="printSection" class="print-area">
  <div id="cardFront" class="card front"></div>
  <div id="cardBack" class="card back"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase Modular SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8fM9O2V5xvxAqbgekHIyilkkfaWNE9dA",
  authDomain: "police-id-system.firebaseapp.com",
  projectId: "police-id-system",
  storageBucket: "police-id-system.appspot.com",
  messagingSenderId: "229965084194",
  appId: "1:229965084194:web:fb2ea97d4a5a9d2bd2bc7b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveToFirebase = async function(data){
  try {
    await addDoc(collection(db, "ids"), data);
    console.log("Saved to Firebase");
  } catch(e){
    console.error("Firebase Error:", e);
  }
}
</script>

<script>
let counter = 0;

function readFile(input, callback){
  if(input.files && input.files[0]){
    const reader = new FileReader();
    reader.onload = e => callback(e.target.result);
    reader.readAsDataURL(input.files[0]);
  } else callback('');
}

function generateID(){
  counter++;
  const id = 'BGRP-' + String(counter).padStart(4,'0');

  const data = {
    id,
    nameAmh: nameAmh.value,
    nameEng: nameEng.value,
    rank: rank.value,
    role: role.value
  };

  const qrText = JSON.stringify(data);

  readFile(photo, photoSrc => {
  readFile(flagLeft, leftFlag => {
  readFile(flagRight, rightFlag => {
  readFile(logo, logoSrc => {
  readFile(signature, signSrc => {

    cardFront.innerHTML = `
      <img src='${leftFlag}' class='emblem left'>
      <img src='${logoSrc}' class='emblem center'>
      <img src='${rightFlag}' class='emblem right'>
      <img src='${photoSrc}' class='photo'>
      <div class='text'>${id}</div>
      <div class='text'>${nameAmh.value}</div>
      <div class='text'>${nameEng.value}</div>
      <div class='text'>${rank.value}</div>
      <div class='text'>${role.value}</div>
      <div class='text'>${phone.value}</div>
      <div class='text'>${blood.value}</div>
    `;

    cardBack.innerHTML = `
      <img src='${logoSrc}' class='watermark'>
      <div class='text'>ማሳሰቢያ: ይህ መታወቂያ የBGRP ፖሊስ አባል ነው</div>
      <div class='text'>Notice: This ID belongs to BGRP Police</div>
      <div class='text'>Age:${age.value} Sex:${sex.value}</div>
      <div class='text'>Height:${height.value}</div>
      <div class='text'>Emergency:${emergencyName.value}</div>
      <div class='text'>Phone:${emergencyPhone.value}</div>
      <div id='qr' class='qr-big'></div>
      <img src='${signSrc}' style='width:80px; position:absolute; bottom:10px; right:10px;'>
    `;

    new QRCode(document.getElementById('qr'), {
      text: qrText,
      width:90,
      height:90
    });

  });});});});});
}

function printID(){
  window.print();
}
</script>

</body>
</html>
